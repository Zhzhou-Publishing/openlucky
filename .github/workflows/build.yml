name: Build OpenLucky

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build CLI
        run: python -m PyInstaller --onefile --name openlucky --distpath bin cmd/openlucky.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Build desktop app
        working-directory: ./app
        run: npm run build:win:portable

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" OpenLucky.iss
        shell: pwsh

      - name: Get version
        id: get_version
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref }}" -replace "refs/tags/", ""
          } else {
            $version = "latest"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Generate MD5 checksum
        # 移除了无效的 working-directory，改在根目录搜索生成的 exe
        run: |
          Get-ChildItem -Filter OpenLucky*.exe | ForEach-Object {
            $checksum = (Get-FileHash -Path $_.FullName -Algorithm MD5).Hash.ToLower()
            $checksumFile = "$($_.BaseName).checksum.txt"
            "$($_.Name):$checksum" | Out-File -FilePath $checksumFile -Encoding utf8
            Write-Host "Created $checksumFile for $($_.Name)"
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openlucky-${{ steps.get_version.outputs.version }}
          path: |
            OpenLucky*.exe
            *.checksum.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenLucky*.exe
            *.checksum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
